{{define "error.html"}}
{{template "base.html" .}}
{{end}}

{{define "title"}}{{.Data.Title}} — msg.{{end}}

{{define "header-right"}}
{{if .Data.User}}
<div class="site-header__actions">
  <span class="site-header__username">{{.Data.User.Name}}</span>
</div>
{{end}}
{{end}}

{{define "content"}}
<div class="error-page">
  <div class="error-card">
    <p class="error-card__code">{{.Data.StatusCode}}</p>
    <h1 class="error-card__title">{{.Data.Title}}</h1>
    <p class="error-card__message">{{.Data.Message}}</p>
    <a href="/" class="btn btn--primary">Go to msg.</a>
  </div>
</div>
{{end}}
