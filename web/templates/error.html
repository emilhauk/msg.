{{define "error.html"}}
{{template "base.html" .}}
{{end}}

{{define "title"}}{{.Title}} — msg.{{end}}

{{define "header-right"}}
{{if .User}}
<div class="site-header__actions">
  <span class="site-header__username">{{.User.Name}}</span>
</div>
{{end}}
{{end}}

{{define "content"}}
<div class="error-page">
  <div class="error-card">
    <p class="error-card__code">{{.StatusCode}}</p>
    <h1 class="error-card__title">{{.Title}}</h1>
    <p class="error-card__message">{{.Message}}</p>
    <a href="/" class="btn btn--primary">Go to msg.</a>
  </div>
</div>
{{end}}
