services:
  redis:
    image: redis:alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

  redisinsight:
    image: redis/redisinsight:latest
    restart: unless-stopped
    environment:
      RI_DB_HOST: redis
      RI_DB_PORT: 6379
      RI_DB_NAME: msg
    volumes:
      - redisinsight_data:/data
    depends_on:
      - redis

  app:
    build: .
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379
    depends_on:
      - redis

volumes:
  redis_data:
  redisinsight_data:
